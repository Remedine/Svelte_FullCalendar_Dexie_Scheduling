# Railway.app configuration for Capital City Windows Scheduler
# SvelteKit + adapter-node (SPA/PWA mode) + PocketBase backend
# Repo: Remedine/Svelte_FullCalendar_Dexie_Scheduling

[build]
builder = "RAILPACK"
# Railpack (Railway's current builder) will:
# - Detect pnpm from pnpm-lock.yaml
# - Run pnpm install
# - Run pnpm build
# Output: ./build (standalone server from @sveltejs/adapter-node)

[deploy]
startCommand = "pnpm start"
# Explicit start command guarantees Railpack detects how to run the server.
# "pnpm start" executes "node build" (see package.json), which starts the
# adapter-node server. It automatically listens on Railway's $PORT.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Healthcheck (optional - the app serves a PWA shell at /)
# healthcheckPath = "/"
# healthcheckTimeout = 30

# IMPORTANT for this app:
# Set PUBLIC_POCKETBASE_URL in the Railway service Variables tab.
# This is required at runtime (client-side Dexie + PocketBase sync).
# The value must be reachable from the browser (public URL or exposed service).

# Multi-service note:
# If running PocketBase in the same Railway project, create a separate
# service (Railway PocketBase template or custom) and point this app's
# PUBLIC_POCKETBASE_URL at it (use the public domain or internal DNS).
# PocketBase service must use numReplicas = 1 (see Remedine/pocketbase railway.toml)
# so SSE + subscribe hit the same instance; Railway has no sticky sessions.

# Required per-environment variables (Svelte service):
#   PUBLIC_POCKETBASE_URL / PUBLIC_PB_URL  → that environment's PocketBase public URL
#   INTERNAL_SECRET                        → must match PocketBase service
#   BODY_SIZE_LIMIT=64M                    → backup .zip uploads (adapter-node default is 512KB)
#   GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON      → optional; full service-account JSON for Drive backups
#   GOOGLE_DRIVE_FOLDER_ID                 → optional default folder (overridable in Options → Backups)
#
# Required per-environment variables (PocketBase service):
#   PB_PUBLIC_URL, INTERNAL_SECRET, POCKETBASE_ADMIN_EMAIL, POCKETBASE_ADMIN_PASSWORD
#
# When duplicating an environment for staging, re-point PUBLIC_* and PB_PUBLIC_URL at the
# new PocketBase domain after create (duplicate copies production URLs).
